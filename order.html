<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Coffee — Brewed Awakening</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --black: #0A0A08; --cream: #F2EDE4; --gold: #B8965A; --gold-light: #D4B07A; --brown: #2C1A0E; --mid: #7A7060; --border: rgba(184,150,90,0.25); }
  html { scroll-behavior: smooth; }
  body { background: var(--black); color: var(--cream); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(10,10,8,0.95); border-bottom: 1px solid var(--border); }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--gold); text-decoration: none; }
  .nav-balance { font-size: 13px; color: var(--mid); }
  .nav-balance span { color: var(--gold); font-weight: 500; }
  .container { max-width: 680px; margin: 0 auto; padding: 100px 24px 60px; }
  .section-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: clamp(28px, 4vw, 40px); font-weight: 700; line-height: 1.1; margin-bottom: 32px; }
  .gold-line { width: 100%; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); opacity: 0.3; margin: 32px 0; }
  /* PHONE LOGIN */
  .login-card { border: 1px solid var(--border); padding: 48px 40px; text-align: center; }
  .login-card p { font-size: 14px; color: var(--mid); margin-bottom: 32px; line-height: 1.7; }
  .form-group { margin-bottom: 20px; text-align: left; }
  .form-label { display: block; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .form-input, .form-select, .form-textarea { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--cream); padding: 14px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.3s; appearance: none; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); }
  .form-select option { background: var(--black); }
  .form-textarea { resize: vertical; min-height: 70px; }
  .btn { width: 100%; padding: 16px; background: var(--gold); color: var(--black); border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
  .btn:hover { background: var(--gold-light); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--mid); }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); background: transparent; }
  /* BALANCE CARD */
  .balance-card { border: 1px solid var(--border); padding: 32px; margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center; }
  .balance-info h3 { font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 4px; }
  .balance-info p { font-size: 13px; color: var(--mid); }
  .balance-cups { text-align: right; }
  .balance-cups .num { font-family: 'Playfair Display', serif; font-size: 48px; font-weight: 900; color: var(--gold); line-height: 1; }
  .balance-cups .label { font-size: 11px; color: var(--mid); letter-spacing: 0.1em; text-transform: uppercase; }
  .bonus-tag { display: inline-block; background: rgba(184,150,90,0.1); border: 1px solid var(--border); padding: 4px 10px; font-size: 11px; color: var(--gold); margin-top: 8px; }
  /* DRINK MENU */
  .menu-section { margin-bottom: 32px; }
  .menu-cat-title { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .drink-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
  .drink-option { border: 1px solid var(--border); padding: 14px 16px; cursor: pointer; transition: all 0.3s; }
  .drink-option:hover, .drink-option.selected { border-color: var(--gold); background: rgba(184,150,90,0.08); }
  .drink-name { font-size: 14px; font-weight: 500; color: var(--cream); margin-bottom: 3px; }
  .drink-desc { font-size: 11px; color: var(--mid); }
  /* CUSTOMISE */
  .customise-section { border: 1px solid var(--border); padding: 24px; margin-bottom: 24px; }
  .customise-title { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
  .option-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .option-pill { padding: 8px 16px; border: 1px solid var(--border); font-size: 12px; color: var(--mid); cursor: pointer; transition: all 0.3s; border-radius: 20px; }
  .option-pill:hover, .option-pill.selected { border-color: var(--gold); color: var(--gold); background: rgba(184,150,90,0.08); }
  /* ORDER SUMMARY */
  .summary-card { border: 1px solid var(--gold); padding: 24px; margin-bottom: 24px; background: rgba(184,150,90,0.04); }
  .summary-title { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
  .summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(184,150,90,0.08); font-size: 13px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-label { color: var(--mid); }
  .summary-value { color: var(--cream); }
  /* STATES */
  .hidden { display: none; }
  
  .error-msg { background: rgba(200,80,80,0.1); border: 1px solid rgba(200,80,80,0.4); color: #e08080; padding: 12px 16px; font-size: 13px; margin-top: 12px; }
  <!-- LOGIN STATE -->
  <div id="login-state">
    <p class="section-label">Your Coffee Portal</p>
    <h1 class="section-title">Order your<br>next coffee.</h1>
    <div class="login-card">
      <p>Enter your WhatsApp number to access your account and place an order.</p>
      <div class="form-group">
        <label class="form-label">WhatsApp Number</label>
        <input class="form-input" type="tel" id="login-phone" placeholder="+27 82 000 0000">
      </div>
      <button class="btn" onclick="lookupCustomer()">Access My Account</button>
      <div class="error-msg hidden" id="login-error"></div>
    </div>
  </div>

  <!-- NO CUPS STATE -->
  <div id="no-cups-state" class="hidden">
    <div class="no-cups">
      <h2>You're out of cups ☕</h2>
      <p>Top up your pack to keep the coffee coming. Every reorder adds a bonus cup to your balance.</p>
      <a href="/#order" class="btn" style="display:inline-block; text-decoration:none; margin-bottom:12px;">Get a New Pack</a>
      <br>
      <button class="btn btn-ghost" onclick="logout()">Switch Account</button>
    </div>
  </div>

  <!-- ORDER STATE -->
  <div id="order-state" class="hidden">
    <p class="section-label">Good to see you</p>
    <h1 class="section-title" id="greeting">What are you having?</h1>

    <!-- Balance -->
    <div class="balance-card">
      <div class="balance-info">
        <h3 id="customer-name-display">Your Account</h3>
        <p id="pack-type-display"></p>
        <div class="bonus-tag hidden" id="bonus-tag"></div>
      </div>
      <div class="balance-cups">
        <div class="num" id="cups-display">0</div>
        <div class="label">cups left</div>
      </div>
    </div>

    <div class="gold-line"></div>

    <!-- Drink Menu -->
    <div class="menu-section">
      <div class="menu-cat-title">The Classics</div>
      <div class="drink-grid">
        <div class="drink-option" onclick="selectDrink(this,'Espresso')"><div class="drink-name">Espresso</div><div class="drink-desc">Single origin, pulled fresh</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Doppio')"><div class="drink-name">Doppio</div><div class="drink-desc">Double espresso, short and strong</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Americano')"><div class="drink-name">Americano</div><div class="drink-desc">Bold and clean</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Cortado')"><div class="drink-name">Cortado</div><div class="drink-desc">Equal parts espresso and milk</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Cappuccino')"><div class="drink-name">Cappuccino</div><div class="drink-desc">Classic, proper foam</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Flat White')"><div class="drink-name">Flat White</div><div class="drink-desc">Double ristretto, silky microfoam</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Latte')"><div class="drink-name">Latte</div><div class="drink-desc">Smooth and velvety</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Mocha')"><div class="drink-name">Mocha</div><div class="drink-desc">Espresso and Belgian chocolate</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Hot Chocolate')"><div class="drink-name">Hot Chocolate</div><div class="drink-desc">Belgian chocolate, steamed milk</div></div>
      </div>

      <div class="menu-cat-title">Signatures</div>
      <div class="drink-grid">
        <div class="drink-option" onclick="selectDrink(this,'Honey Lavender Latte')"><div class="drink-name">Honey Lavender Latte</div><div class="drink-desc">Floral and warming</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Rose Latte')"><div class="drink-name">Rose Latte</div><div class="drink-desc">Delicate and aromatic</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Dirty Chai Latte')"><div class="drink-name">Dirty Chai Latte</div><div class="drink-desc">Spiced chai and espresso</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Vanilla Latte')"><div class="drink-name">Vanilla Latte</div><div class="drink-desc">House vanilla, velvety milk</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Hazelnut Latte')"><div class="drink-name">Hazelnut Latte</div><div class="drink-desc">Toasted hazelnut syrup</div></div>
      </div>

      <div class="menu-cat-title">Iced & Cold</div>
      <div class="drink-grid">
        <div class="drink-option" onclick="selectDrink(this,'Iced Latte')"><div class="drink-name">Iced Latte</div><div class="drink-desc">Espresso over ice with cold milk</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Iced Rose Latte')"><div class="drink-name">Iced Rose Latte</div><div class="drink-desc">Cold, pretty, perfect</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Iced Caramel Latte')"><div class="drink-name">Iced Caramel Latte</div><div class="drink-desc">Caramel drizzle over ice</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Cold Brew')"><div class="drink-name">Cold Brew</div><div class="drink-desc">12-hour steep, smooth</div></div>
        <div class="drink-option" onclick="selectDrink(this,'Cold Brew Tonic')"><div class="drink-name">Cold Brew Tonic</div><div class="drink-desc">Crisp and unexpected</div></div>
      </div>
    </div>

    <!-- Customise -->
    <div class="customise-section" id="customise-section" style="display:none">
      <div class="customise-title">Customise your order</div>
      <div class="form-group">
        <label class="form-label">Milk preference</label>
        <div class="option-row" id="milk-options">
          <div class="option-pill selected" onclick="selectMilk(this,'Whole milk')">Whole milk</div>
          <div class="option-pill" onclick="selectMilk(this,'Oat milk')">Oat milk (+R8)</div>
          <div class="option-pill" onclick="selectMilk(this,'Almond milk')">Almond milk (+R8)</div>
          <div class="option-pill" onclick="selectMilk(this,'Skinny')">Skinny</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Any notes?</label>
        <textarea class="form-textarea form-input" id="order-notes" placeholder="Extra shot, no sugar, extra hot..."></textarea>
      </div>
    </div>

    <!-- Summary -->
    <div class="summary-card hidden" id="summary-card">
      <div class="summary-title">Order Summary</div>
      <div class="summary-row"><span class="summary-label">Drink</span><span class="summary-value" id="sum-drink">—</span></div>
      <div class="summary-row"><span class="summary-label">Milk</span><span class="summary-value" id="sum-milk">—</span></div>
      <div class="summary-row"><span class="summary-label">Delivering to</span><span class="summary-value" id="sum-address">—</span></div>
      <div class="summary-row"><span class="summary-label">Cups after this order</span><span class="summary-value" id="sum-remaining">—</span></div>
    </div>

    <button class="btn hidden" id="place-order-btn" onclick="placeOrder()">Place My Order</button>
    <div class="error-msg hidden" id="order-error"></div>
    <br><br>
    <button class="btn btn-ghost" onclick="logout()" style="margin-top:8px">Switch Account</button>
  </div>

  <!-- SUCCESS STATE -->
  <div id="success-state" class="hidden">
    <div class="success-card">
      <h2>Order placed ✓</h2>
      <p>Your coffee is being made. We'll be at your door within 30 minutes.</p>
      <p id="success-cups-msg"></p>
      <div class="gold-line"></div>
      <p style="font-size:13px; color:var(--mid)">Need anything else? Place another order below.</p>
      <button class="btn" onclick="resetOrder()" style="margin-top:24px">Order Another</button>
    </div>
  </div>

</div>
  <script>
  const { createClient } = supabase;
  const db = createClient(
    'https://tjbcszfaveyzlcvwuxtw.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqYmNzemZhdmV5emxjdnd1eHR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njc4MDAsImV4cCI6MjA5NDE0MzgwMH0.GloLk5-9h-wh8XdmQkLIxyAcTGOIB0YnptN-t_eZ_4Y'
  );

  let currentCustomer = null;
  let selectedDrink = null;
  let selectedMilk = 'Whole milk';

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }

  async function lookupCustomer() {
    const phone = document.getElementById('login-phone').value.trim();
    const errorEl = document.getElementById('login-error');
    
    if (!phone) {
      errorEl.textContent = 'Please enter your WhatsApp number.';
      errorEl.classList.remove('hidden');
      return;
    }

    const btn = document.querySelector('#login-state .btn');
    btn.disabled = true;
    btn.textContent = 'Looking up...';
    errorEl.classList.add('hidden');

    try {
      const { data, error } = await db.from('customers').select('*').eq('phone', phone).single();
      
      if (error || !data) {
        errorEl.textContent = 'No account found for that number. Please check your number or purchase a pack first.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Access My Account';
        return;
      }

      currentCustomer = data;
      loadOrderState();
    } catch (err) {
      errorEl.textContent = 'Something went wrong. Please try again.';
      errorEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Access My Account';
    }
  }

  function loadOrderState() {
    hide('login-state');
    
    const c = currentCustomer;
    const totalCups = c.cups_remaining + c.bonus_cups;

    if (totalCups <= 0) {
      show('no-cups-state');
      return;
    }

    document.getElementById('greeting').textContent = `What are you having, ${c.name ? c.name.split(' ')[0] : 'there'}?`;
    document.getElementById('customer-name-display').textContent = c.name || 'Your Account';
    document.getElementById('pack-type-display').textContent = c.pack_type || '';
    document.getElementById('cups-display').textContent = totalCups;
    document.getElementById('nav-cups').textContent = totalCups;
    show('nav-balance');

    if (c.bonus_cups > 0) {
      const bonusTag = document.getElementById('bonus-tag');
      bonusTag.textContent = `+${c.bonus_cups} loyalty bonus cup${c.bonus_cups > 1 ? 's' : ''}`;
      bonusTag.classList.remove('hidden');
    }

    show('order-state');
  }

  function selectDrink(el, drink) {
    selectedDrink = drink;
    document.querySelectorAll('.drink-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('customise-section').style.display = 'block';
    updateSummary();
    show('summary-card');
    show('place-order-btn');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function selectMilk(el, milk) {
    selectedMilk = milk;
    document.querySelectorAll('.option-pill').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    updateSummary();
  }

  function updateSummary() {
    const c = currentCustomer;
    const totalCups = c.cups_remaining + c.bonus_cups;
    document.getElementById('sum-drink').textContent = selectedDrink || '—';
    document.getElementById('sum-milk').textContent = selectedMilk;
    document.getElementById('sum-address').textContent = c.address || 'Your registered address';
    document.getElementById('sum-remaining').textContent = totalCups - 1;
  }

  async function placeOrder() {
    if (!selectedDrink) return;
    
    const btn = document.getElementById('place-order-btn');
    const errorEl = document.getElementById('order-error');
    btn.disabled = true;
    btn.textContent = 'Placing order...';
    errorEl.classList.add('hidden');

    const c = currentCustomer;
    const notes = document.getElementById('order-notes').value.trim();

    try {
      // Save drink order
      const { error: orderError } = await db.from('drink_orders').insert([{
        customer_phone: c.phone,
        customer_name: c.name,
        drink: selectedDrink,
        milk_preference: selectedMilk,
        address: c.address,
        notes: notes || null,
        status: 'pending'
      }]);

      if (orderError) throw orderError;

      // Deduct cup — use bonus cups first
      let newBonus = c.bonus_cups;
      let newRemaining = c.cups_remaining;
      if (newBonus > 0) { newBonus -= 1; } else { newRemaining -= 1; }

      const { error: updateError } = await db.from('customers').update({
        cups_remaining: newRemaining,
        bonus_cups: newBonus
      }).eq('phone', c.phone);

      if (updateError) throw updateError;

      // Update local state
      currentCustomer.cups_remaining = newRemaining;
      currentCustomer.bonus_cups = newBonus;
      const remaining = newRemaining + newBonus;

      hide('order-state');
      document.getElementById('success-cups-msg').textContent = `You have ${remaining} cup${remaining !== 1 ? 's' : ''} remaining.`;
      show('success-state');

    } catch (err) {
      errorEl.textContent = 'Something went wrong placing your order. Please try again.';
      errorEl.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Place My Order';
    }
  }

  function resetOrder() {
    selectedDrink = null;
    selectedMilk = 'Whole milk';
    document.querySelectorAll('.drink-option').forEach(o => o.classList.remove('selected'));
    document.querySelectorAll('.option-pill').forEach(o => o.classList.remove('selected'));
    document.querySelector('.option-pill').classList.add('selected');
    document.getElementById('order-notes').value = '';
    document.getElementById('customise-section').style.display = 'none';
    hide('summary-card');
    hide('place-order-btn');
    hide('success-state');
    loadOrderState();
  }

  function logout() {
    currentCustomer = null;
    selectedDrink = null;
    hide('order-state');
    hide('no-cups-state');
    hide('success-state');
    hide('nav-balance');
    document.getElementById('login-phone').value = '';
    show('login-state');
  }
</script>
</body>
</html>
  .success-card { border: 1px solid var(--go
