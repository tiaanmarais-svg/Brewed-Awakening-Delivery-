<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful — Brewed Awakening</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0A0A08; color: #F2EDE4; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .card { max-width: 520px; width: 100%; border: 1px solid rgba(184,150,90,0.25); padding: 60px 48px; text-align: center; }
  .icon { font-size: 48px; margin-bottom: 24px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 900; color: #B8965A; margin-bottom: 16px; }
  p { font-size: 15px; color: #7A7060; line-height: 1.7; margin-bottom: 12px; }
  .detail { background: rgba(184,150,90,0.06); border: 1px solid rgba(184,150,90,0.15); padding: 20px; margin: 24px 0; text-align: left; }
  .detail-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(184,150,90,0.08); font-size: 13px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: #7A7060; }
  .detail-value { color: #F2EDE4; font-weight: 500; }
  .gold-line { width: 60px; height: 2px; background: #B8965A; margin: 0 auto 32px; }
  .home-btn { display: inline-block; margin-top: 32px; padding: 14px 32px; background: #B8965A; color: #0A0A08; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; transition: all 0.3s; }
  .home-btn:hover { background: #D4B07A; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">☕</div>
  <div class="gold-line"></div>
  <h1>Payment Successful</h1>
  <p>Your pack is confirmed. We'll WhatsApp you within the hour to activate your account.</p>
  <p>When you're ready for your first coffee, just WhatsApp us your order and address.</p>
  <div class="detail" id="order-details">
    <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value" style="color:#B8965A">Confirmed ✓</span></div>
    <div class="detail-row" id="row-pack" style="display:none"><span class="detail-label">Pack</span><span class="detail-value" id="val-pack"></span></div>
    <div class="detail-row" id="row-name" style="display:none"><span class="detail-label">Name</span><span class="detail-value" id="val-name"></span></div>
    <div class="detail-row" id="row-whatsapp" style="display:none"><span class="detail-label">WhatsApp</span><span class="detail-value" id="val-whatsapp">066 202 1549</span></div>
  </div>
  <a href="/" class="home-btn">Back to Home</a>
</div>

<script>
  const { createClient } = supabase;
  const db = createClient(
    'https://tjbcszfaveyzlcvwuxtw.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqYmNzemZhdmV5emxjdnd1eHR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njc4MDAsImV4cCI6MjA5NDE0MzgwMH0.GloLk5-9h-wh8XdmQkLIxyAcTGOIB0YnptN-t_eZ_4Y'
  );

  const params = new URLSearchParams(window.location.search);
  const name = params.get('name');
  const pack = params.get('pack');
  const phone = params.get('phone');
  const address = params.get('address');
  const customerType = params.get('type');
  const notes = params.get('notes');

  if (name) {
    document.getElementById('row-name').style.display = 'flex';
    document.getElementById('val-name').textContent = name;
  }
  if (pack) {
    document.getElementById('row-pack').style.display = 'flex';
    document.getElementById('val-pack').textContent = pack;
  }
  document.getElementById('row-whatsapp').style.display = 'flex';

  async function saveOrder() {
    if (!name || !phone) return;
    try {
      await db.from('orders').insert([{
        name,
        phone,
        address,
        pack_type: pack,
        customer_type: customerType,
        notes: notes || null,
        status: 'paid'
      }]);
    } catch (err) {
      console.error('Could not save order:', err);
    }
  }

  saveOrder();
</script>
</body>
</html>
